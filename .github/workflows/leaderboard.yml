name: live-leaderboard

# Refresh the leaderboard on real market data while the US market is open and
# commit leaderboard.json (the site reads it). Every 2 hours during the session
# means the numbers genuinely move (the daily bar's last price updates intraday) —
# not faked motion, just real marks. No runs after the close. Manual run available.
on:
  schedule:
    # Every 2h while the US market is open: 14/16/18/20 UTC = ~10:00 ET through the
    # 16:00 ET (20:00 UTC) close, Mon–Fri. Set for EDT (the Round 1 window). No runs after close.
    - cron: "0 14,16,18,20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet yfinance
      - name: Compute leaderboard
        run: python live_runner.py
      - name: Commit if changed
        run: |
          git config user.name "builderr-bot"
          git config user.email "noreply@builderr.ai"
          git add leaderboard.json private_results.json history.json
          git diff --staged --quiet || git commit -m "live leaderboard $(date -u +%FT%TZ)"
          git push
